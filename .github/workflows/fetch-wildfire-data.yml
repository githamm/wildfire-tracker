name: Fetch Wildfire Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch all WF incidents from NIFC (paginated)
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, sys, time
          from datetime import datetime, timezone

          BASE   = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services"
          LAYER  = f"{BASE}/WFIGS_Incident_Locations_Current/FeatureServer/0"
          FIELDS = ",".join([
              "IncidentName","IncidentTypeCategory","IncidentSize",
              "PercentContained","POOState","POOCounty","POOCity",
              "FireCause","FireDiscoveryDateTime","ContainmentDateTime",
              "TotalIncidentPersonnel","IncidentComplexityLevel",
              "POOLandownerCategory","UniqueFireIdentifier","OBJECTID",
          ])

          def fetch_page(offset, page_size=1000):
              params = urllib.parse.urlencode({
                  "where":             "IncidentTypeCategory = 'WF' AND IncidentSize > 1",
                  "outFields":         FIELDS,
                  "f":                 "geojson",
                  "resultRecordCount": str(page_size),
                  "resultOffset":      str(offset),
                  "orderByFields":     "IncidentSize DESC",
              })
              url = f"{LAYER}/query?{params}"
              req = urllib.request.Request(url, headers={"User-Agent": "WildfireMonitor/1.0"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.loads(r.read())
              if "error" in data:
                  raise Exception(f"API error: {data['error']}")
              feats    = data.get("features", [])
              exceeded = data.get("properties", {}).get("exceededTransferLimit", False)
              return feats, exceeded

          all_features = []
          offset = 0
          page   = 1
          while True:
              print(f"Page {page} (offset {offset})...", flush=True)
              feats, exceeded = fetch_page(offset)
              all_features.extend(feats)
              print(f"  -> {len(feats)} features (running total: {len(all_features)})")
              if not feats or not exceeded:
                  break
              offset += len(feats)
              page   += 1
              time.sleep(0.3)

          print(f"\nFetched {len(all_features)} total WF incidents")

          out = {
              "type": "FeatureCollection",
              "meta": {
                  "fetched_at":    datetime.now(timezone.utc).isoformat(),
                  "fetched_at_ms": int(datetime.now(timezone.utc).timestamp() * 1000),
                  "count":         len(all_features),
                  "source":        "NIFC WFIGS ArcGIS REST API",
                  "layer":         "WFIGS_Incident_Locations_Current",
                  "filter":        "IncidentTypeCategory='WF' AND IncidentSize > 1",
              },
              "features": all_features,
          }

          with open("wf_current.json", "w") as f:
              json.dump(out, f, separators=(",", ":"))
          print("Wrote wf_current.json")
          PYEOF

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wf_current.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(json.load(open('wf_current.json'))['meta']['count'])")
            git commit -m "data: ${COUNT} WF incidents [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
