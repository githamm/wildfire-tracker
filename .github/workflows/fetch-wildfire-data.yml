name: Fetch Wildfire Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write fetch script
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import urllib.request, json

          def fetch_all_features(base_url, where, out_fields):
              """Pages through an ArcGIS FeatureServer query and returns a single
              GeoJSON FeatureCollection. Using f=geojson (not f=json) means Esri
              always returns coordinates in WGS84 lon/lat, regardless of the
              service's native spatial reference -- no outSR reprojection needed."""
              all_features = []
              offset = 0
              while True:
                  params = (
                      "?where=" + urllib.parse.quote(where) +
                      "&outFields=" + urllib.parse.quote(out_fields) +
                      "&returnGeometry=true&f=geojson" +
                      "&resultRecordCount=2000&resultOffset=" + str(offset)
                  )
                  url = base_url + params
                  print("Fetching offset", offset, "from", base_url)
                  with urllib.request.urlopen(url, timeout=60) as r:
                      data = json.loads(r.read())

                  if "error" in data:
                      raise SystemExit("API error from " + base_url + ": " + str(data["error"]))

                  features = data.get("features", [])
                  if not features:
                      break

                  all_features.extend(features)
                  offset += len(features)
                  print("  total so far:", len(all_features))

                  exceeded = data.get("properties", {}).get("exceededTransferLimit", False)
                  if not exceeded:
                      break

              return {"type": "FeatureCollection", "features": all_features}

          def write_json(filename, geojson):
              with open(filename, "w", encoding="utf-8") as f:
                  json.dump(geojson, f, separators=(",", ":"))
              print("Wrote", filename, "with", len(geojson["features"]), "features")

          import urllib.parse

          # --- Map: all current wildfire incidents (no prescribed burns), nationwide ---
          # (Matches the WFIGS_Incident_Locations_Current query originally used
          # directly by map.js. "Current" already excludes finalized/closed
          # incidents server-side. IncidentTypeCategory is restricted to WF/CX
          # -- the only types the client ever renders -- so RX (prescribed
          # fire) records are dropped here rather than just hidden client-side.)
          map_geojson = fetch_all_features(
              "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_Current/FeatureServer/0/query",
              "IncidentTypeCategory IN ('WF','CX')",
              "FireCause,FireDiscoveryDateTime,IncidentName,IncidentTypeCategory,PercentContained,POOCounty,POOLandownerCategory,POOState,TotalIncidentPersonnel,IncidentSize,ModifiedOnDateTime_dt,IncidentComplexityLevel,POOCity"
          )
          if not map_geojson["features"]:
              raise SystemExit("No features returned for map_data.json")
          write_json("map_data.json", map_geojson)

          # --- Table / chart: Colorado wildfires, year to date ---
          # (Includes already-contained fires -- the table intentionally shows
          # the full year, not just active incidents.)
          table_geojson = fetch_all_features(
              "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_YearToDate/FeatureServer/0/query",
              "IncidentTypeCategory='WF' AND POOState='US-CO'",
              "IncidentSize,FireCause,IncidentName,PercentContained,POOCounty,IncidentTypeCategory,FireDiscoveryDateTime"
          )
          if not table_geojson["features"]:
              raise SystemExit("No features returned for table_data.json")
          write_json("table_data.json", table_geojson)

          # --- Perimeters: current Colorado wildfire perimeters (no prescribed burns) ---
          # (Previously fetched directly from NIFC by every browser; mirrored
          # here so the client only ever talks to raw.githubusercontent.com.
          # Unlike the point service above, NIFC's perimeter service does NOT
          # exclude RX by default, and the map's perimeter layer had no
          # client-side type check -- so this filter is added here to keep
          # prescribed-burn perimeters off the map entirely.)
          perimeter_geojson = fetch_all_features(
              "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters_Current/FeatureServer/0/query",
              "attr_POOState='US-CO' AND attr_IncidentTypeCategory='WF'",
              "attr_IncidentName,poly_IncidentName,attr_FireCause,attr_IncidentTypeCategory,poly_GISAcres,attr_IncidentSize,attr_PercentContained,attr_TotalIncidentPersonnel,attr_IncidentComplexityLevel,attr_POOCity,attr_POOLandownerCategory,attr_POOCounty,attr_FireDiscoveryDateTime,attr_ModifiedOnDateTime_dt,poly_DateCurrent"
          )
          # Perimeters aren't available for every fire, so an empty result here
          # is valid (unlike the two feeds above) -- don't fail the job over it.
          write_json("perimeter_data.json", perimeter_geojson)

          print("Done")
          PYEOF

      - name: Run fetch script
        run: python3 /tmp/fetch.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add map_data.json table_data.json perimeter_data.json
          git diff --staged --quiet || git commit -m "chore: update wildfire data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
