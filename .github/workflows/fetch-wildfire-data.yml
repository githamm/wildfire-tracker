name: Fetch Wildfire Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Download WFIGS YTD CSV
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import csv
          import io

          BASE = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_YTD/FeatureServer/0/query"
          PARAMS = "where=1%3D1&outFields=*&f=json&resultOffset={offset}&resultRecordCount=2000"

          all_features = []
          offset = 0

          while True:
              url = f"{BASE}?{PARAMS.format(offset=offset)}"
              print(f"Fetching offset {offset}...")
              with urllib.request.urlopen(url, timeout=60) as r:
                  data = json.loads(r.read())
              features = data.get("features", [])
              if not features:
                  break
              all_features.extend(features)
              offset += len(features)
              if not data.get("exceededTransferLimit", False):
                  break

          print(f"Total features: {len(all_features)}")

          if not all_features:
              raise SystemExit("No features returned — aborting")

          # Write CSV
          fields = list(all_features[0]["attributes"].keys()) + ["x", "y"]
          with open("data/wildfire_ytd.csv", "w", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fields)
              w.writeheader()
              for feat in all_features:
                  row = dict(feat["attributes"])
                  geom = feat.get("geometry") or {}
                  row["x"] = geom.get("x")
                  row["y"] = geom.get("y")
                  w.writerow(row)

          print("CSV written successfully")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wildfire_ytd.csv
          git diff --staged --quiet || git commit -m "chore: update wildfire data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
