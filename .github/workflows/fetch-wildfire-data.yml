name: Fetch Wildfire Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Download WFIGS YTD CSV
        run: |
          curl -L \
            "https://opendata.arcgis.com/api/v3/datasets/405814902c9e411cb4384c49d694e82b_0/downloads/data?format=csv&spatialRefId=4326&where=1=1" \
            -o data/wildfire_ytd.csv

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wildfire_ytd.csv
          git diff --staged --quiet || git commit -m "chore: update wildfire data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
