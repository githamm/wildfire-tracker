name: Fetch Wildfire Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch current WF incidents from NIFC
        run: |
          BASE="https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services"
          CURRENT="${BASE}/WFIGS_Incident_Locations_Current/FeatureServer/0/query"
          YTD="${BASE}/WFIGS_Incident_Locations_YTD/FeatureServer/0/query"

          # Build query string in a variable to avoid shell expansion issues
          PARAMS="where=IncidentTypeCategory+%3D+%27WF%27+AND+IncidentSize+%3E+1"
          PARAMS="${PARAMS}&outFields=IncidentName%2CIncidentTypeCategory%2CIncidentSize%2CPercentContained%2CPOOState%2CPOOCounty%2CPOOCity%2CFireCause%2CFireDiscoveryDateTime%2CContainmentDateTime%2CTotalIncidentPersonnel%2CIncidentComplexityLevel%2CPOOLandownerCategory%2CUniqueFireIdentifier%2COBJECTID"
          PARAMS="${PARAMS}&f=geojson&resultRecordCount=2000&orderByFields=IncidentSize+DESC"

          echo "Fetching current incidents..."
          curl --fail --show-error --location \
            "${CURRENT}?${PARAMS}" \
            -o wf_current_raw.json
          echo "Current: $(python3 -c "import json; d=json.load(open('wf_current_raw.json')); print(len(d.get('features', [])))")" features

          echo "Fetching YTD incidents..."
          curl --fail --show-error --location \
            "${YTD}?${PARAMS}" \
            -o wf_ytd_raw.json
          echo "YTD: $(python3 -c "import json; d=json.load(open('wf_ytd_raw.json')); print(len(d.get('features', [])))")" features

      - name: Wrap with metadata and write final files
        run: |
          python3 - << 'PYEOF'
          import json
          from datetime import datetime, timezone

          now_iso = datetime.now(timezone.utc).isoformat()
          now_ms  = int(datetime.now(timezone.utc).timestamp() * 1000)

          def process(path, label):
              with open(path) as f:
                  data = json.load(f)
              features = data.get('features', [])
              print(f'{label}: {len(features)} features')
              return {
                  'type': 'FeatureCollection',
                  'meta': {
                      'fetched_at':    now_iso,
                      'fetched_at_ms': now_ms,
                      'count':         len(features),
                      'source':        'NIFC WFIGS ArcGIS REST API',
                      'filter':        "IncidentTypeCategory='WF' AND IncidentSize > 1",
                  },
                  'features': features,
              }

          current = process('wf_current_raw.json', 'Current')
          ytd     = process('wf_ytd_raw.json',     'YTD')

          with open('wf_current.json', 'w') as f:
              json.dump(current, f, separators=(',', ':'))

          with open('wf_ytd.json', 'w') as f:
              json.dump(ytd, f, separators=(',', ':'))

          print('Done.')
          PYEOF

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wf_current.json wf_ytd.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(json.load(open('wf_current.json'))['meta']['count'])")
            git commit -m "data: wildfire update — ${COUNT} current WF incidents [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
