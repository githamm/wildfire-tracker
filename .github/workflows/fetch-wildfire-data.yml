name: Fetch Wildfire Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and save wildfire data
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, sys
          from datetime import datetime, timezone

          BASE = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services"
          FIELDS = ",".join([
              "IncidentName", "IncidentTypeCategory", "IncidentSize",
              "PercentContained", "POOState", "POOCounty", "POOCity",
              "FireCause", "FireDiscoveryDateTime", "ContainmentDateTime",
              "TotalIncidentPersonnel", "IncidentComplexityLevel",
              "POOLandownerCategory", "UniqueFireIdentifier", "OBJECTID",
          ])
          PARAMS = urllib.parse.urlencode({
              "where":            "IncidentTypeCategory = 'WF' AND IncidentSize > 1",
              "outFields":        FIELDS,
              "f":                "geojson",
              "resultRecordCount":"2000",
              "orderByFields":    "IncidentSize DESC",
          })

          ENDPOINTS = {
              "wf_current_raw.json": f"{BASE}/WFIGS_Incident_Locations_Current/FeatureServer/0/query?{PARAMS}",
              "wf_ytd_raw.json":     f"{BASE}/WFIGS_Incident_Locations_YTD/FeatureServer/0/query?{PARAMS}",
          }

          now_iso = datetime.now(timezone.utc).isoformat()
          now_ms  = int(datetime.now(timezone.utc).timestamp() * 1000)

          for filename, url in ENDPOINTS.items():
              print(f"\nFetching: {url}\n")
              req = urllib.request.Request(url, headers={"User-Agent": "WildfireMonitor/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read()
              except Exception as e:
                  print(f"ERROR fetching {filename}: {e}", file=sys.stderr)
                  sys.exit(1)

              data = json.loads(raw)
              if "error" in data:
                  print(f"API error: {data['error']}", file=sys.stderr)
                  sys.exit(1)

              features = data.get("features", [])
              print(f"  -> {len(features)} features")

              out = {
                  "type": "FeatureCollection",
                  "meta": {
                      "fetched_at":    now_iso,
                      "fetched_at_ms": now_ms,
                      "count":         len(features),
                      "source":        "NIFC WFIGS ArcGIS REST API",
                  },
                  "features": features,
              }
              outfile = filename.replace("_raw", "").replace("current", "current").replace("ytd", "ytd")
              with open(outfile, "w") as f:
                  json.dump(out, f, separators=(",", ":"))
              print(f"  -> wrote {outfile}")

          print("\nAll done.")
          PYEOF

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wf_current.json wf_ytd.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(json.load(open('wf_current.json'))['meta']['count'])")
            git commit -m "data: wildfire update — ${COUNT} current WF incidents [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
