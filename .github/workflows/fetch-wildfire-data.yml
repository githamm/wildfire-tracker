name: Fetch Wildfire Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch and save wildfire data
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, sys
          from datetime import datetime, timezone

          BASE = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services"
          FIELDS = ",".join([
              "IncidentName", "IncidentTypeCategory", "IncidentSize",
              "PercentContained", "POOState", "POOCounty", "POOCity",
              "FireCause", "FireDiscoveryDateTime", "ContainmentDateTime",
              "TotalIncidentPersonnel", "IncidentComplexityLevel",
              "POOLandownerCategory", "UniqueFireIdentifier", "OBJECTID",
          ])
          PARAMS = urllib.parse.urlencode({
              "where":             "IncidentTypeCategory = 'WF' AND IncidentSize > 1",
              "outFields":         FIELDS,
              "f":                 "geojson",
              "resultRecordCount": "2000",
              "orderByFields":     "IncidentSize DESC",
          })

          URL = f"{BASE}/WFIGS_Incident_Locations_Current/FeatureServer/0/query?{PARAMS}"
          print(f"Fetching: {URL}\n")

          req = urllib.request.Request(URL, headers={"User-Agent": "WildfireMonitor/1.0"})
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  raw = resp.read()
          except Exception as e:
              print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          data = json.loads(raw)
          if "error" in data:
              print(f"API error: {data['error']}", file=sys.stderr)
              sys.exit(1)

          features = data.get("features", [])
          print(f"{len(features)} features fetched")

          out = {
              "type": "FeatureCollection",
              "meta": {
                  "fetched_at":    datetime.now(timezone.utc).isoformat(),
                  "fetched_at_ms": int(datetime.now(timezone.utc).timestamp() * 1000),
                  "count":         len(features),
                  "source":        "NIFC WFIGS ArcGIS REST API",
                  "layer":         "WFIGS_Incident_Locations_Current",
              },
              "features": features,
          }

          with open("wf_current.json", "w") as f:
              json.dump(out, f, separators=(",", ":"))

          print("Wrote wf_current.json")
          PYEOF

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wf_current.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(json.load(open('wf_current.json'))['meta']['count'])")
            git commit -m "data: ${COUNT} current WF incidents [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
