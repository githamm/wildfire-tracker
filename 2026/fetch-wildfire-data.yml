name: Fetch Wildfire Data

on:
  schedule:
    - cron: '5 * * * *'   # every hour at :05
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]        # seed on first deploy

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch current WF incidents from NIFC
        run: |
          BASE="https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services"
          FIELDS="IncidentName,IncidentTypeCategory,IncidentSize,PercentContained,POOState,POOCounty,POOCity,FireCause,FireDiscoveryDateTime,ContainmentDateTime,TotalIncidentPersonnel,IncidentComplexityLevel,POOLandownerCategory,UniqueFireIdentifier,OBJECTID"

          # Current active incidents
          curl -sf \
            "${BASE}/WFIGS_Incident_Locations_Current/FeatureServer/0/query?\
where=IncidentTypeCategory%3D%27WF%27%20AND%20IncidentSize%20%3E%201\
&outFields=${FIELDS}&f=geojson&resultRecordCount=2000\
&orderByFields=IncidentSize%20DESC" \
            -o wf_current_raw.json

          # Year-to-date incidents
          curl -sf \
            "${BASE}/WFIGS_Incident_Locations_YTD/FeatureServer/0/query?\
where=IncidentTypeCategory%3D%27WF%27%20AND%20IncidentSize%20%3E%201\
&outFields=${FIELDS}&f=geojson&resultRecordCount=2000\
&orderByFields=IncidentSize%20DESC" \
            -o wf_ytd_raw.json

      - name: Wrap with metadata and write final files
        run: |
          python3 - << 'PYEOF'
          import json
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_iso = now.isoformat()
          now_ts  = int(now.timestamp() * 1000)

          def process(path, label):
              with open(path) as f:
                  data = json.load(f)
              features = data.get('features', [])
              print(f'{label}: {len(features)} features')
              return {
                  'type': 'FeatureCollection',
                  'meta': {
                      'fetched_at':    now_iso,
                      'fetched_at_ms': now_ts,
                      'count':         len(features),
                      'source':        'NIFC WFIGS ArcGIS REST API',
                      'filter':        "IncidentTypeCategory='WF' AND IncidentSize > 1",
                  },
                  'features': features,
              }

          current = process('wf_current_raw.json', 'Current')
          ytd     = process('wf_ytd_raw.json',     'YTD')

          with open('wf_current.json', 'w') as f:
              json.dump(current, f, separators=(',', ':'))

          with open('wf_ytd.json', 'w') as f:
              json.dump(ytd, f, separators=(',', ':'))

          print('Done.')
          PYEOF

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wf_current.json wf_ytd.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(json.load(open('wf_current.json'))['meta']['count'])")
            git commit -m "data: wildfire update — ${COUNT} current WF incidents [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi